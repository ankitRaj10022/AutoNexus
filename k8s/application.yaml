apiVersion: v1
kind: ConfigMap
metadata:
  name: autonexus-config
data:
  APP_ENV: "production"
  DATABASE_URL: "postgresql+asyncpg://autonexus:devpassword123@postgres:5432/autonexus"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/0"
  JWT_SECRET_KEY: "k8s-production-jwt-secret-replace-me"
  JWT_REFRESH_SECRET_KEY: "k8s-production-jwt-refresh-secret-replace-me"
  STRIPE_SECRET_KEY: "sk_test_replace_me"
  STRIPE_WEBHOOK_SECRET: "whsec_replace_me"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app: api
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/ankitraj10022/autonexus/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: autonexus-config
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/ankitraj10022/autonexus/api:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "app.celery_app.celery", "worker", "--loglevel=info", "--concurrency=4"]
          envFrom:
            - configMapRef:
                name: autonexus-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beat
  template:
    metadata:
      labels:
        app: beat
    spec:
      containers:
        - name: beat
          image: ghcr.io/ankitraj10022/autonexus/api:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "app.celery_app.celery", "beat", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: autonexus-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/ankitraj10022/autonexus/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "/api/v1"
