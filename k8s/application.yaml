apiVersion: v1
kind: ConfigMap
metadata:
  name: autonexus-config
data:
  ENVIRONMENT: "production"
  DATABASE_URL: "postgresql+asyncpg://autonexus:devpassword123@postgres:5432/autonexus"
  REDIS_URL: "redis://redis:6379/0"
  JWT_SECRET: "k8s-production-jwt-secret-replace-me"
  STRIPE_SECRET_KEY: "sk_test_replace_me"
  STRIPE_WEBHOOK_SECRET: "whsec_replace_me"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app: api
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: autonexus-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: autonexus-config
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: autonexus-api:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "app.celery_app", "worker", "-l", "info", "-Q", "workflows", "-c", "4"]
          envFrom:
            - configMapRef:
                name: autonexus-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beat
  template:
    metadata:
      labels:
        app: beat
    spec:
      containers:
        - name: beat
          image: autonexus-api:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "app.celery_app", "beat", "-l", "info"]
          envFrom:
            - configMapRef:
                name: autonexus-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: autonexus-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "/api/v1"
