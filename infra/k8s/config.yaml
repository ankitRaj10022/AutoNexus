apiVersion: v1
kind: ConfigMap
metadata:
  name: autonexus-config
  namespace: autonexus
data:
  APP_NAME: "AutoNexus"
  APP_ENV: "production"
  API_V1_PREFIX: "/api/v1"
  LOG_LEVEL: "INFO"
  PROMETHEUS_ENABLED: "true"
  DATABASE_POOL_SIZE: "20"
  DATABASE_MAX_OVERFLOW: "10"
---
apiVersion: v1
kind: Secret
metadata:
  name: autonexus-secrets
  namespace: autonexus
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://autonexus:CHANGE_ME@postgres:5432/autonexus"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  JWT_SECRET_KEY: "CHANGE_ME_TO_64_CHAR_RANDOM_STRING"
  JWT_REFRESH_SECRET_KEY: "CHANGE_ME_TO_ANOTHER_64_CHAR_STRING"
  STRIPE_SECRET_KEY: "sk_test_placeholder"
  STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
