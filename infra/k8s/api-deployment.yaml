apiVersion: apps/v1
kind: Deployment
metadata:
  name: autonexus-api
  namespace: autonexus
  labels:
    app: autonexus-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autonexus-api
  template:
    metadata:
      labels:
        app: autonexus-api
    spec:
      containers:
      - name: api
        image: autonexus/api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: autonexus-config
        - secretRef:
            name: autonexus-secrets
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: autonexus-api
  namespace: autonexus
spec:
  selector:
    app: autonexus-api
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: autonexus-api-hpa
  namespace: autonexus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autonexus-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
