apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: autonexus-ingress
  namespace: autonexus
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/websocket-services: "autonexus-api"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
spec:
  ingressClassName: nginx
  rules:
  - host: api.autonexus.io
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: autonexus-api
            port:
              number: 8000
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: autonexus-api
            port:
              number: 8000
      - path: /health
        pathType: Exact
        backend:
          service:
            name: autonexus-api
            port:
              number: 8000
