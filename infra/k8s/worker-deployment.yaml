apiVersion: apps/v1
kind: Deployment
metadata:
  name: autonexus-worker
  namespace: autonexus
  labels:
    app: autonexus-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autonexus-worker
  template:
    metadata:
      labels:
        app: autonexus-worker
    spec:
      containers:
      - name: worker
        image: autonexus/api:latest
        command: ["celery", "-A", "app.celery_app.celery", "worker",
                  "--loglevel=info", "--concurrency=4",
                  "--queues=execution,orchestration,scheduler",
                  "--max-tasks-per-child=1000"]
        envFrom:
        - configMapRef:
            name: autonexus-config
        - secretRef:
            name: autonexus-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "1Gi"
        livenessProbe:
          exec:
            command: ["celery", "-A", "app.celery_app.celery", "inspect", "ping"]
          initialDelaySeconds: 30
          periodSeconds: 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: autonexus-worker-hpa
  namespace: autonexus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autonexus-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
