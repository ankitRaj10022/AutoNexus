  <text x="304" y="844" fill="#9BA5BB" font-family="Arial, Helvetica, sans-serif" font-size="16">Build complex workflows by connecting nodes</text>
  <text x="304" y="870" fill="#9BA5BB" font-family="Arial, Helvetica, sans-serif" font-size="16">visually. Built on React Flow for flexibility.</text>

