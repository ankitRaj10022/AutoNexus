  <text x="470" y="368" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="800">with</text>
  <text x="585" y="368" fill="url(#headline)" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="800">intelligent precision.</text>

  <text x="536" y="460" fill="#93A0B8" font-family="Arial, Helvetica, sans-serif" font-size="18">The production-grade, multi-tenant SaaS platform that empowers your</text>
  <text x="528" y="495" fill="#93A0B8" font-family="Arial, Helvetica, sans-serif" font-size="18">team to build, monitor, and scale complex automated workflows visually.</text>

