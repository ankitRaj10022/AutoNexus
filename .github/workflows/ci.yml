name: AutoNexus CI/CD
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install ruff
      - name: Lint backend
        run: ruff check backend/
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Lint frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint

  test-backend:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: backend
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key-for-ci
          JWT_REFRESH_SECRET_KEY: test-refresh-secret-for-ci
        run: python -m pytest tests -v --tb=short

  test-frontend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and test
        working-directory: frontend
        run: |
          npm ci
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' || github.event_name == 'release'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Normalize image names
        id: image-vars
        run: |
          repository=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "api=${{ env.REGISTRY }}/${repository}/api" >> "$GITHUB_OUTPUT"
          echo "frontend=${{ env.REGISTRY }}/${repository}/frontend" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.image-vars.outputs.api }}:latest
            ${{ steps.image-vars.outputs.api }}:${{ github.sha }}
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.image-vars.outputs.frontend }}:latest
            ${{ steps.image-vars.outputs.frontend }}:${{ github.sha }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: echo "Deploy to staging K8s cluster with kubectl set image"

  deploy-production:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Normalize image names
        id: image-vars
        run: |
          repository=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "api=${{ env.REGISTRY }}/${repository}/api" >> "$GITHUB_OUTPUT"
          echo "frontend=${{ env.REGISTRY }}/${repository}/frontend" >> "$GITHUB_OUTPUT"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
      - name: Configure kubectl for EKS
        run: |
          if [ -z "${{ vars.AWS_REGION }}" ] || [ -z "${{ vars.EKS_CLUSTER_NAME }}" ]; then
            echo "Missing AWS_REGION or EKS_CLUSTER_NAME environment variables." >&2
            exit 1
          fi

          export KUBECONFIG="$RUNNER_TEMP/kubeconfig.yaml"
          aws eks update-kubeconfig \
            --name "${{ vars.EKS_CLUSTER_NAME }}" \
            --region "${{ vars.AWS_REGION }}" \
            --kubeconfig "$KUBECONFIG"

          echo "KUBECONFIG=$KUBECONFIG" >> "$GITHUB_ENV"
          kubectl config current-context
          kubectl cluster-info
      - name: Deploy to production
        run: |
          kubectl apply -f k8s/infrastructure.yaml
          rendered_manifest="$(mktemp)"
          cp k8s/application.yaml "$rendered_manifest"
          sed -i 's|ghcr.io/ankitraj10022/autonexus/api:latest|${{ steps.image-vars.outputs.api }}:${{ github.sha }}|g' "$rendered_manifest"
          sed -i 's|ghcr.io/ankitraj10022/autonexus/frontend:latest|${{ steps.image-vars.outputs.frontend }}:${{ github.sha }}|g' "$rendered_manifest"
          kubectl apply -f "$rendered_manifest"
          kubectl apply -f k8s/ingress.yaml
      - name: Verify production rollout
        run: |
          kubectl rollout status statefulset/postgres
          kubectl rollout status statefulset/redis
          kubectl rollout status deployment/api
          kubectl rollout status deployment/worker
          kubectl rollout status deployment/beat
          kubectl rollout status deployment/frontend
